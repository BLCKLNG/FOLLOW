<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=2560, height=1440, initial-scale=1" />

<style>
@font-face {
  font-family: 'Poppins';
  src: url('fonts/Poppins-Bold.ttf') format('truetype');
  font-weight: 700;
}

html, body { margin:0; background:transparent; overflow:hidden; }
* { box-sizing:border-box; }

:root{
  --carpet-h: 240px;
  --gold: #d4af37;
}

body{
  width:2560px;
  height:1440px;
}

#wrap{
  position:absolute;
  left:0; right:0;
  bottom:53px;
  display:flex;
  justify-content:center;
}

#carpet{
  width:1400px;
  height:var(--carpet-h);
  border-radius:50px;

  background: linear-gradient(180deg,#7a0f1f,#3d0810);
  border:6px solid var(--gold);

  display:flex;
  align-items:center;
  justify-content:center;

  overflow:hidden;
}

#icons{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity 1s linear;
}

#icons.out{ opacity:0; }

/* ===== SHARED PAGE LAYOUT ===== */
.page{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 60px;
}

/* ===== LOGOS ===== */
.side-logo{
  height:140px; /* safe size, no clipping */
  width:auto;

  filter:
    drop-shadow(0 0 10px rgba(212,175,55,0.6))
    drop-shadow(0 0 20px rgba(212,175,55,0.3));
}

/* ===== DISCORD ===== */
.discord-center{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.discord-title{
  font-size:70px;
  color:var(--gold);
  font-weight:700;
  text-transform:uppercase;
  margin-bottom:10px;
}

.discord-link{
  font-size:34px;
  color:var(--gold);
}

/* ===== BLCKLNG ===== */
.blcklng-text{
  font-family:'Poppins', sans-serif;
  font-size:120px;
  color:var(--gold);

  text-shadow:
    0 0 10px rgba(212,175,55,0.9),
    0 0 25px rgba(212,175,55,0.6);
}
</style>
</head>

<body>
<div id="wrap">
  <div id="carpet">
    <div id="icons"></div>
  </div>
</div>

<script>
const pages = [
  {
    type:"discord",
    logo:"discord.png",
    title:"JOIN DISCORD",
    link:"https://discord.gg/TXUBQnpbJH"
  },
  {
    type:"social",
    logo:"tiktok.png",
    text:"BLCKLNG"
  },
  {
    type:"social",
    logo:"twitch.png",
    text:"BLCKLNG"
  }
];

const iconsEl = document.getElementById("icons");

function makeLogo(src){
  const img=document.createElement("img");
  img.className="side-logo";
  img.src="images/"+src;
  return img;
}

function render(page){
  iconsEl.innerHTML="";

  const box=document.createElement("div");
  box.className="page";

  const leftLogo = makeLogo(page.logo);
  const rightLogo = makeLogo(page.logo);

  const center=document.createElement("div");

  if(page.type==="discord"){
    center.className="discord-center";

    const title=document.createElement("div");
    title.className="discord-title";
    title.textContent=page.title;

    const link=document.createElement("div");
    link.className="discord-link";
    link.textContent=page.link;

    center.appendChild(title);
    center.appendChild(link);
  }

  if(page.type==="social"){
    center.className="blcklng-text";
    center.textContent=page.text;
  }

  box.appendChild(leftLogo);
  box.appendChild(center);
  box.appendChild(rightLogo);

  iconsEl.appendChild(box);
}

let i=0;
render(pages[i]);

setInterval(()=>{
  iconsEl.classList.add("out");

  setTimeout(()=>{
    i=(i+1)%pages.length;
    render(pages[i]);
    iconsEl.classList.remove("out");
  },1000);

},6000);
</script>
</body>
</html>
